<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#141418">
<title>Vinyl DJ Mobile</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#141418; --panel:#1a1a20; --panel2:#20202a; --line:#2a2a32;
    --a:#c93c3c; --b:#3c7cc9; --txt:#e2e2e8; --dim:#9a9aa2;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overflow:hidden; touch-action:manipulation;
  }
  .deck{
    flex:1 1 0; min-height:0; margin:6px; padding:8px 10px;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    display:flex; flex-direction:column; gap:6px;
  }
  .deck.a{border-top:3px solid var(--a);}
  .deck.b{border-top:3px solid var(--b);}
  .row{display:flex; align-items:center; gap:8px;}
  .title{font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;}
  .badge{font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; letter-spacing:1px;}
  .a .badge{background:var(--a); color:#fff;}
  .b .badge{background:var(--b); color:#fff;}
  .time{font-variant-numeric:tabular-nums; font-size:11px; color:var(--dim); min-width:88px; text-align:right;}
  canvas.wave{width:100%; height:52px; background:#101015; border-radius:6px; display:block;}
  .transport{display:flex; gap:6px;}
  button.ctl{
    flex:1; padding:9px 0; border:none; border-radius:8px; font-size:14px; font-weight:600;
    background:var(--panel2); color:var(--txt);
  }
  button.ctl:active{filter:brightness(1.4);}
  .a button.play.on{background:var(--a); color:#fff;}
  .b button.play.on{background:var(--b); color:#fff;}
  button.load{background:#2c2c36; color:var(--txt);}
  .knobs{display:flex; gap:8px;}
  .knob{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;}
  .knob label{font-size:9px; color:var(--dim); letter-spacing:.5px;}
  input[type=range]{-webkit-appearance:none; width:100%; height:26px; background:transparent;}
  input[type=range].vh{}
  input[type=range]::-webkit-slider-runnable-track{height:5px; border-radius:3px; background:#33333d;}
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
    background:#e8e8ee; margin-top:-8px; box-shadow:0 1px 3px rgba(0,0,0,.5);
  }
  .a input.acc::-webkit-slider-thumb{background:var(--a);}
  .b input.acc::-webkit-slider-thumb{background:var(--b);}
  .tempo-val{font-size:10px; color:var(--dim); min-width:52px; text-align:right; font-variant-numeric:tabular-nums;}
  /* mixer */
  .mixer{
    margin:0 6px; padding:8px 12px; background:var(--panel);
    border:1px solid var(--line); border-radius:12px;
    display:flex; flex-direction:column; gap:6px;
  }
  .mrow{display:flex; align-items:center; gap:10px;}
  .mrow .lab{font-size:11px; font-weight:700; width:16px; text-align:center;}
  .lab.a{color:var(--a);} .lab.b{color:var(--b);}
  .xf-wrap{display:flex; align-items:center; gap:10px;}
  .xf-wrap input{flex:1;}
  .meter{height:8px; border-radius:4px; background:#101015; overflow:hidden; flex:1;}
  .meter > i{display:block; height:100%; width:0%; background:linear-gradient(90deg,#43c463,#e8c84a 70%,#e5483d);}
  .hint{font-size:10px; color:var(--dim); text-align:center;}
  #splash{
    position:fixed; inset:0; background:var(--bg); z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; text-align:center; padding:24px;
  }
  #splash img{width:110px; height:110px; border-radius:24px;}
  #splash h1{font-size:20px; margin:0;}
  #splash p{color:var(--dim); font-size:13px; margin:0; max-width:280px;}
  #splash button{margin-top:8px; padding:12px 26px; font-size:16px; font-weight:700; border:none; border-radius:10px; background:var(--a); color:#fff;}
  input[type=file]{display:none;}
</style>
</head>
<body>

<!-- Deck A -->
<section class="deck a" id="deckA">
  <div class="row"><span class="badge">A</span><span class="title" data-title>— Sin pista —</span><span class="time" data-time>00:00 / 00:00</span></div>
  <canvas class="wave" data-wave></canvas>
  <div class="transport">
    <button class="ctl load" data-load>📂 Cargar</button>
    <button class="ctl" data-cue>◆ CUE</button>
    <button class="ctl play" data-play>▶</button>
  </div>
  <div class="row">
    <span style="font-size:9px;color:var(--dim);width:34px;">TEMPO</span>
    <input type="range" class="acc" data-tempo min="-16" max="16" step="0.1" value="0">
    <span class="tempo-val" data-tempoval>0.0%</span>
  </div>
  <div class="knobs">
    <div class="knob"><label>GRAVES</label><input type="range" data-eq="low" min="0" max="100" value="50"></div>
    <div class="knob"><label>MEDIOS</label><input type="range" data-eq="mid" min="0" max="100" value="50"></div>
    <div class="knob"><label>AGUDOS</label><input type="range" data-eq="high" min="0" max="100" value="50"></div>
    <div class="knob"><label>VOL</label><input type="range" class="acc" data-vol min="0" max="100" value="100"></div>
  </div>
  <input type="file" accept="audio/*,.mp3,.m4a,.aac,.wav,.aiff,.flac" data-file>
</section>

<!-- Mixer -->
<section class="mixer">
  <div class="mrow"><span class="lab a">A</span><div class="meter"><i data-meter="a"></i></div></div>
  <div class="mrow"><span class="lab b">B</span><div class="meter"><i data-meter="b"></i></div></div>
  <div class="xf-wrap">
    <span class="lab a">A</span>
    <input type="range" id="xfader" min="-100" max="100" value="0">
    <span class="lab b">B</span>
  </div>
  <div class="hint">Crossfader — toca dos veces para centrar</div>
</section>

<!-- Deck B -->
<section class="deck b" id="deckB">
  <div class="knobs">
    <div class="knob"><label>GRAVES</label><input type="range" data-eq="low" min="0" max="100" value="50"></div>
    <div class="knob"><label>MEDIOS</label><input type="range" data-eq="mid" min="0" max="100" value="50"></div>
    <div class="knob"><label>AGUDOS</label><input type="range" data-eq="high" min="0" max="100" value="50"></div>
    <div class="knob"><label>VOL</label><input type="range" class="acc" data-vol min="0" max="100" value="100"></div>
  </div>
  <div class="row">
    <span style="font-size:9px;color:var(--dim);width:34px;">TEMPO</span>
    <input type="range" class="acc" data-tempo min="-16" max="16" step="0.1" value="0">
    <span class="tempo-val" data-tempoval>0.0%</span>
  </div>
  <div class="transport">
    <button class="ctl load" data-load>📂 Cargar</button>
    <button class="ctl" data-cue>◆ CUE</button>
    <button class="ctl play" data-play>▶</button>
  </div>
  <canvas class="wave" data-wave></canvas>
  <div class="row"><span class="badge">B</span><span class="title" data-title>— Sin pista —</span><span class="time" data-time>00:00 / 00:00</span></div>
  <input type="file" accept="audio/*,.mp3,.m4a,.aac,.wav,.aiff,.flac" data-file>
</section>

<div id="splash">
  <img src="icons/icon-512.png" alt="">
  <h1>Vinyl DJ Mobile</h1>
  <p>Dos platos, crossfader y EQ para pinchar desde el iPhone. Carga los temas desde Archivos / iCloud Drive.</p>
  <button id="startBtn">Empezar</button>
</div>

<script>
"use strict";
const AC = window.AudioContext || window.webkitAudioContext;
let ctx = null, master = null;

// ---- crossfader curve (matches desktop "mixing" fader) ----
function xfGains(x){ // x in -1..1
  return { a: x<=0 ? 1 : Math.max(0,1-x), b: x>=0 ? 1 : Math.max(0,1+x) };
}
function fmt(t){ t=Math.max(0,t||0); const m=Math.floor(t/60), s=Math.floor(t%60); return (m<10?'0':'')+m+':'+(s<10?'0':'')+s; }

class Deck {
  constructor(el, name){
    this.el = el; this.name = name;
    this.buffer = null; this.source = null;
    this.playing = false;
    this.offset = 0;            // seconds into the track (when paused)
    this.startTime = 0;         // ctx time when current source started
    this.startOffset = 0;       // track offset at startTime
    this.rate = 1;              // playbackRate (tempo)
    this.cuePoint = 0;
    this.duration = 0;
    // DOM
    this.$title = el.querySelector('[data-title]');
    this.$time  = el.querySelector('[data-time]');
    this.$play  = el.querySelector('[data-play]');
    this.$cue   = el.querySelector('[data-cue]');
    this.$file  = el.querySelector('[data-file]');
    this.$canvas= el.querySelector('[data-wave]');
    this.$tempo = el.querySelector('[data-tempo]');
    this.$tempoVal = el.querySelector('[data-tempoval]');
    this.$vol   = el.querySelector('[data-vol]');
    this.peaks = null;
  }
  build(){ // audio graph — call after ctx exists
    this.low  = ctx.createBiquadFilter(); this.low.type='lowshelf';  this.low.frequency.value=120;
    this.mid  = ctx.createBiquadFilter(); this.mid.type='peaking';   this.mid.frequency.value=1000; this.mid.Q.value=0.9;
    this.high = ctx.createBiquadFilter(); this.high.type='highshelf';this.high.frequency.value=6000;
    this.channel = ctx.createGain();  // VOL
    this.xf = ctx.createGain();       // crossfader contribution
    this.analyser = ctx.createAnalyser(); this.analyser.fftSize=256;
    this._an = new Uint8Array(this.analyser.frequencyBinCount);
    this.low.connect(this.mid); this.mid.connect(this.high);
    this.high.connect(this.channel); this.channel.connect(this.xf);
    this.xf.connect(this.analyser); this.analyser.connect(master);
    this.wire();
  }
  wire(){
    this.$play.addEventListener('click', ()=> this.toggle());
    this.$cue.addEventListener('click', ()=> this.cue());
    this.el.querySelector('[data-load]').addEventListener('click', ()=> this.$file.click());
    this.$file.addEventListener('change', e=> this.loadFile(e.target.files[0]));
    this.$tempo.addEventListener('input', ()=> this.setTempo(parseFloat(this.$tempo.value)));
    this.$vol.addEventListener('input', ()=> { this.channel.gain.value = this.$vol.value/100; });
    this.el.querySelectorAll('[data-eq]').forEach(s=>{
      s.addEventListener('input', ()=> this.setEq(s.dataset.eq, parseFloat(s.value)));
    });
    // seek by tapping the waveform
    const seek = clientX=>{
      if(!this.duration) return;
      const r=this.$canvas.getBoundingClientRect();
      const frac=Math.min(1,Math.max(0,(clientX-r.left)/r.width));
      this.seek(frac*this.duration);
    };
    this.$canvas.addEventListener('touchstart', e=>{ seek(e.touches[0].clientX); e.preventDefault(); }, {passive:false});
    this.$canvas.addEventListener('mousedown', e=> seek(e.clientX));
  }
  async loadFile(file){
    if(!file) return;
    this.$title.textContent = 'Cargando…';
    try{
      const buf = await file.arrayBuffer();
      this.buffer = await ctx.decodeAudioData(buf);
      this.duration = this.buffer.duration;
      this.stopSource(); this.playing=false; this.offset=0; this.cuePoint=0;
      this.$play.classList.remove('on'); this.$play.textContent='▶';
      this.$title.textContent = file.name.replace(/\.[^.]+$/,'');
      this.computePeaks(); this.draw();
      this.updateTime();
    }catch(err){
      this.$title.textContent = 'No se pudo abrir el archivo';
      console.error(err);
    }
  }
  computePeaks(){
    const ch = this.buffer.getChannelData(0);
    const N = 600, block = Math.floor(ch.length/N), peaks=new Float32Array(N);
    for(let i=0;i<N;i++){ let mx=0; const s=i*block; for(let j=0;j<block;j+=32){ const v=Math.abs(ch[s+j]||0); if(v>mx)mx=v; } peaks[i]=mx; }
    this.peaks = peaks;
  }
  draw(){
    const c=this.$canvas, dpr=window.devicePixelRatio||1;
    const w=c.clientWidth, h=c.clientHeight; c.width=w*dpr; c.height=h*dpr;
    const g=c.getContext('2d'); g.scale(dpr,dpr); g.clearRect(0,0,w,h);
    if(!this.peaks) return;
    const N=this.peaks.length, bw=w/N, pos=this.duration? this.position()/this.duration : 0;
    const accent = this.name==='A' ? '#c93c3c' : '#3c7cc9';
    for(let i=0;i<N;i++){
      const ph=Math.max(1,this.peaks[i]*h*0.9), x=i*bw, y=(h-ph)/2;
      g.fillStyle = (i/N)<=pos ? accent : '#3a3a44';
      g.fillRect(x,y,Math.max(1,bw-0.5),ph);
    }
  }
  position(){
    if(this.playing) return this.startOffset + (ctx.currentTime - this.startTime)*this.rate;
    return this.offset;
  }
  stopSource(){ if(this.source){ try{this.source.onended=null; this.source.stop();}catch(e){} this.source=null; } }
  startAt(off){
    this.stopSource();
    const s=ctx.createBufferSource(); s.buffer=this.buffer; s.playbackRate.value=this.rate;
    s.connect(this.low); s.start(0, Math.max(0,off));
    s.onended = ()=>{ if(this.playing && this.position()>=this.duration-0.05){ this.playing=false; this.offset=this.duration; this.$play.classList.remove('on'); this.$play.textContent='▶'; } };
    this.source=s; this.startTime=ctx.currentTime; this.startOffset=off;
  }
  toggle(){ if(!this.buffer) return; this.playing? this.pause() : this.play(); }
  play(){ if(!this.buffer) return; if(this.offset>=this.duration) this.offset=0;
    this.startAt(this.offset); this.playing=true; this.$play.classList.add('on'); this.$play.textContent='❚❚'; }
  pause(){ this.offset=this.position(); this.stopSource(); this.playing=false; this.$play.classList.remove('on'); this.$play.textContent='▶'; }
  cue(){ // pause+return to cue point, or set cue point if already stopped there
    if(!this.buffer) return;
    if(this.playing){ this.pause(); this.seek(this.cuePoint); }
    else { this.cuePoint=this.offset; this.seek(this.cuePoint); }
  }
  seek(t){ t=Math.min(this.duration,Math.max(0,t));
    if(this.playing) this.startAt(t); else this.offset=t;
    this.updateTime(); this.draw(); }
  setTempo(pct){ this.rate=1+pct/100; this.$tempoVal.textContent=(pct>=0?'+':'')+pct.toFixed(1)+'%';
    if(this.playing){ const now=this.position(); this.startOffset=now; this.startTime=ctx.currentTime; if(this.source) this.source.playbackRate.value=this.rate; } }
  setEq(band,v){ const db=(v-50)/50*24; ({low:this.low,mid:this.mid,high:this.high})[band].gain.value=db; }
  updateTime(){ this.$time.textContent = fmt(this.position())+' / '+fmt(this.duration); }
  meterLevel(){ if(!this.analyser) return 0; this.analyser.getByteTimeDomainData(this._an);
    let mx=0; for(let i=0;i<this._an.length;i++){ const v=Math.abs(this._an[i]-128); if(v>mx)mx=v; } return mx/128; }
}

let deckA, deckB, xfader;
function initAudio(){
  if(ctx) return;
  ctx = new AC(); master = ctx.createGain(); master.connect(ctx.destination);
  deckA = new Deck(document.getElementById('deckA'),'A'); deckA.build();
  deckB = new Deck(document.getElementById('deckB'),'B'); deckB.build();
  xfader = document.getElementById('xfader');
  const applyXf = ()=>{ const g=xfGains(xfader.value/100); deckA.xf.gain.value=g.a; deckB.xf.gain.value=g.b; };
  xfader.addEventListener('input', applyXf); applyXf();
  // double-tap to centre
  let lastTap=0;
  xfader.addEventListener('touchend', ()=>{ const n=Date.now(); if(n-lastTap<300){ xfader.value=0; applyXf(); } lastTap=n; });
  // meters + time + playhead loop
  const mA=document.querySelector('[data-meter="a"]'), mB=document.querySelector('[data-meter="b"]');
  function loop(){
    mA.style.width=Math.min(100,deckA.meterLevel()*130)+'%';
    mB.style.width=Math.min(100,deckB.meterLevel()*130)+'%';
    if(deckA.playing){ deckA.updateTime(); deckA.draw(); }
    if(deckB.playing){ deckB.updateTime(); deckB.draw(); }
    requestAnimationFrame(loop);
  }
  loop();
  window.addEventListener('resize', ()=>{ deckA.draw(); deckB.draw(); });
}

document.getElementById('startBtn').addEventListener('click', async ()=>{
  initAudio();
  if(ctx.state!=='running'){ try{ await ctx.resume(); }catch(e){} }
  document.getElementById('splash').style.display='none';
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
