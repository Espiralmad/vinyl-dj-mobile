<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f13">
<title>Vinyl DJ Mobile</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#0f0f13; --panel:#1b1b22; --btn:#24242e; --btn2:#2c2c38;
    --a:#c8683c; --a2:#e07a44; --b:#2fb6a6; --b2:#38c9b6;
    --txt:#e6e6ec; --dim:#8a8a94;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;}
  html,body{margin:0; height:100%; width:100%; overflow:hidden;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    touch-action:none;
  }
  /* Rotate hint for portrait */
  #rotate{position:fixed; inset:0; z-index:30; background:var(--bg); display:none;
    flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; padding:24px; color:var(--dim);}
  #rotate .big{font-size:40px;}
  @media (orientation:portrait){ #rotate{display:flex;} #app{display:none;} }

  #app{position:fixed; inset:0; display:grid;
    grid-template-columns: 1fr minmax(120px,150px) 1fr;
    padding:calc(env(safe-area-inset-top) + 6px) calc(env(safe-area-inset-right) + 8px) calc(env(safe-area-inset-bottom) + 6px) calc(env(safe-area-inset-left) + 8px);
    gap:8px; align-items:stretch;}

  .deck{display:grid; grid-template-rows:auto 1fr auto; gap:6px; min-width:0;}
  .dhead{display:flex; align-items:center; gap:8px;}
  .deck.b .dhead{flex-direction:row-reverse;}
  .title{flex:1; font-size:13px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .deck.b .title{text-align:right;}

  .rbtn{width:44px; height:44px; border-radius:50%; border:none; background:var(--btn);
    color:var(--txt); font-size:18px; display:flex; align-items:center; justify-content:center; flex:0 0 auto;}
  .rbtn:active{filter:brightness(1.4);}
  .rbtn.plus.a{color:var(--a2);} .rbtn.plus.b{color:var(--b2);}
  .rbtn svg{width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}
  .rbtn small{position:absolute;}

  .mid{display:flex; min-height:0; align-items:stretch; gap:6px;}
  .deck.b .mid{flex-direction:row-reverse;}
  .side{display:flex; flex-direction:column; align-items:center; gap:8px; justify-content:center;}
  .fader{writing-mode:vertical-lr; direction:rtl; width:30px; flex:1; -webkit-appearance:none; background:transparent;}
  .fader::-webkit-slider-runnable-track{width:5px; border-radius:3px; background:#33333d;}
  .fader::-webkit-slider-thumb{-webkit-appearance:none; width:40px; height:22px; border-radius:5px; background:#e8e8ee; box-shadow:0 1px 3px rgba(0,0,0,.5);}
  .bpm-tag{font-size:10px; font-weight:700; color:#0f0f13; background:#d8d8de; padding:2px 6px; border-radius:4px;}

  .platter-wrap{flex:1; display:flex; align-items:center; justify-content:center; min-width:0;}
  .platter{position:relative; aspect-ratio:1/1; height:100%; max-height:100%; max-width:100%; border-radius:50%;}
  .spin{position:absolute; inset:0; border-radius:50%; will-change:transform;}
  .grooves{position:absolute; inset:0; border-radius:50%;}
  .deck.a .grooves{background:
    repeating-radial-gradient(circle at 50% 50%, #00000022 0 2px, #00000000 2px 4px),
    radial-gradient(circle at 50% 50%, var(--a2), var(--a) 60%, #9c4e2c 100%);}
  .deck.b .grooves{background:
    repeating-radial-gradient(circle at 50% 50%, #00000022 0 2px, #00000000 2px 4px),
    radial-gradient(circle at 50% 50%, var(--b2), var(--b) 60%, #227e73 100%);}
  .marker{position:absolute; left:calc(50% - 2px); top:4%; width:4px; height:44%; border-radius:2px;
    background:#1b1b22;}
  .label{position:absolute; inset:34%; border-radius:50%; background:#161620; display:flex; align-items:center; justify-content:center;
    box-shadow:inset 0 0 0 2px #00000033;}
  .label svg{width:52%; height:52%;}
  .deck.a .label .d{fill:var(--a2);} .deck.b .label .d{fill:var(--b2);}

  .bottom{display:flex; gap:6px;}
  .deck.b .bottom{flex-direction:row-reverse;}
  .pill{flex:1; padding:12px 0; border:none; border-radius:11px; background:var(--btn);
    color:var(--txt); font-size:13px; font-weight:700; letter-spacing:1px;}
  .pill:active{filter:brightness(1.4);}
  .pill.play.on.a{background:var(--a);} .pill.play.on.b{background:var(--b);}
  .pill.cue.armed{color:#ffd27a;}

  /* center column */
  .center{display:flex; flex-direction:column; align-items:center; gap:8px; min-width:0;}
  .center .top-btns{display:flex; gap:6px;}
  .center .home{position:relative;}
  .center .home .dot{position:absolute; top:6px; right:6px; width:7px; height:7px; border-radius:50%; background:var(--a2);}
  .playmaster{flex:1; display:flex; align-items:center; justify-content:center; width:100%;}
  .xf-row{display:flex; align-items:center; gap:8px; width:100%;}
  .xf-row .ar{color:var(--dim); font-size:14px;}
  #xfader{flex:1; -webkit-appearance:none; height:26px; background:transparent;}
  #xfader::-webkit-slider-runnable-track{height:8px; border-radius:5px;
    background:linear-gradient(90deg,var(--a),#555 50%,var(--b));}
  #xfader::-webkit-slider-thumb{-webkit-appearance:none; width:22px; height:30px; border-radius:6px; background:#e8e8ee; margin-top:-11px; box-shadow:0 1px 4px rgba(0,0,0,.6);}
  .meters{display:flex; gap:5px; width:100%; padding:0 2px;}
  .meter{flex:1; height:6px; border-radius:3px; background:#101015; overflow:hidden;}
  .meter > i{display:block; height:100%; width:0%;}
  .meter.a > i{background:linear-gradient(90deg,#43c463,#e8c84a 70%,var(--a2));}
  .meter.b > i{background:linear-gradient(90deg,#43c463,#e8c84a 70%,var(--b2));}
  .tval{font-size:9px; color:var(--dim); font-variant-numeric:tabular-nums;}

  /* EQ popup */
  .eqpop{position:fixed; inset:0; z-index:25; background:#000000aa; display:none; align-items:center; justify-content:center;}
  .eqpop.show{display:flex;}
  .eqcard{background:var(--panel); border-radius:16px; padding:18px 20px; width:min(420px,88vw);}
  .eqcard h3{margin:0 0 12px; font-size:14px;}
  .eqcard .sliders{display:flex; gap:16px;}
  .eqcard .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;}
  .eqcard .col label{font-size:10px; color:var(--dim); letter-spacing:.5px;}
  .eqcard .col input{writing-mode:vertical-lr; direction:rtl; height:130px; width:30px; -webkit-appearance:none; background:transparent;}
  .eqcard .col input::-webkit-slider-runnable-track{width:5px; border-radius:3px; background:#33333d;}
  .eqcard .col input::-webkit-slider-thumb{-webkit-appearance:none; width:34px; height:20px; border-radius:5px; background:#e8e8ee;}
  .eqcard button.close{margin-top:16px; width:100%; padding:11px; border:none; border-radius:10px; background:var(--btn2); color:var(--txt); font-weight:700;}

  /* catálogo */
  .catpop{position:fixed; inset:0; z-index:35; background:#0f0f13f7; display:none; flex-direction:column;
    padding:calc(env(safe-area-inset-top) + 10px) 12px 12px;}
  .catpop.show{display:flex;}
  .cathead{display:flex; gap:8px; align-items:center;}
  .cathead input{flex:1; padding:11px 12px; border-radius:10px; border:1px solid var(--btn2); background:var(--btn); color:var(--txt); font-size:15px;}
  .cathead select{padding:10px; border-radius:10px; border:1px solid var(--btn2); background:var(--btn); color:var(--txt); font-size:13px; max-width:38%;}
  .cathead button{width:42px; height:42px; border:none; border-radius:10px; background:var(--btn2); color:var(--txt); font-size:16px; flex:0 0 auto;}
  .catstatus{color:var(--dim); font-size:12px; padding:6px 2px;}
  .catresults{flex:1; overflow-y:auto; margin-top:6px; -webkit-overflow-scrolling:touch;}
  .catrow{display:flex; align-items:center; gap:8px; padding:8px 6px; border-bottom:1px solid #ffffff10;}
  .catrow .info{flex:1; min-width:0;}
  .catrow .info b{font-weight:600; font-size:14px;}
  .catrow .info .sub{color:var(--dim); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .catrow .badge{font-size:9px; padding:1px 5px; border-radius:4px; background:#33333d; color:#cfcfd6; margin-left:6px;}
  .catrow button{width:34px; height:34px; border:none; border-radius:8px; font-weight:700; font-size:13px; color:#fff; flex:0 0 auto;}
  .catrow button.toa{background:var(--a);} .catrow button.tob{background:var(--b);}

  #splash{position:fixed; inset:0; background:var(--bg); z-index:40; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; text-align:center; padding:24px;}
  #splash img{width:100px; height:100px; border-radius:22px;}
  #splash h1{font-size:20px; margin:0;}
  #splash p{color:var(--dim); font-size:13px; margin:0; max-width:300px;}
  #splash button{margin-top:6px; padding:12px 30px; font-size:16px; font-weight:700; border:none; border-radius:10px; background:var(--a); color:#fff;}
  input[type=file]{display:none;}
</style>
</head>
<body>

<div id="rotate"><div class="big">📱↻</div><div>Gira el iPhone en horizontal</div></div>

<div id="app">
  <!-- DECK A -->
  <section class="deck a" id="deckA">
    <div class="dhead">
      <button class="rbtn plus a" data-load aria-label="Cargar">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span class="title" data-title>No track loaded</span>
    </div>
    <div class="mid">
      <div class="side">
        <button class="rbtn eqbtn" data-eq-open aria-label="EQ">
          <svg viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
        </button>
        <input type="range" class="fader" data-tempo min="-16" max="16" step="0.1" value="0" aria-label="Tempo">
        <span class="bpm-tag">BPM</span>
      </div>
      <div class="platter-wrap">
        <div class="platter" data-platter>
          <div class="spin" data-spin>
            <div class="grooves"></div>
            <div class="marker"></div>
          </div>
          <div class="label">
            <svg viewBox="0 0 24 24"><circle class="d" cx="12" cy="7" r="1.5"/><circle class="d" cx="8.5" cy="10" r="1.5"/><circle class="d" cx="15.5" cy="10" r="1.5"/><circle class="d" cx="10" cy="14" r="1.5"/><circle class="d" cx="14" cy="14" r="1.5"/><circle class="d" cx="12" cy="17.5" r="1.5"/></svg>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom">
      <button class="pill cue" data-cue>CUE</button>
      <button class="pill play" data-play>▶</button>
      <button class="pill sync" data-sync>SYNC</button>
    </div>
    <input type="file" accept="audio/*,.mp3,.m4a,.aac,.wav,.aiff,.flac" data-file>
  </section>

  <!-- CENTER -->
  <div class="center">
    <div class="top-btns">
      <button class="rbtn home" data-menu aria-label="Menú"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v9h14v-9"/></svg><span class="dot"></span></button>
    </div>
    <div class="meters">
      <div class="meter a"><i data-meter="a"></i></div>
      <div class="meter b"><i data-meter="b"></i></div>
    </div>
    <div class="playmaster">
      <span class="tval" data-clock>00:00 · 00:00</span>
    </div>
    <div class="xf-row">
      <span class="ar">◀</span>
      <input type="range" id="xfader" min="-100" max="100" value="0">
      <span class="ar">▶</span>
    </div>
  </div>

  <!-- DECK B -->
  <section class="deck b" id="deckB">
    <div class="dhead">
      <button class="rbtn plus b" data-load aria-label="Cargar">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span class="title" data-title>No track loaded</span>
    </div>
    <div class="mid">
      <div class="side">
        <button class="rbtn eqbtn" data-eq-open aria-label="EQ">
          <svg viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
        </button>
        <input type="range" class="fader" data-tempo min="-16" max="16" step="0.1" value="0" aria-label="Tempo">
        <span class="bpm-tag">BPM</span>
      </div>
      <div class="platter-wrap">
        <div class="platter" data-platter>
          <div class="spin" data-spin>
            <div class="grooves"></div>
            <div class="marker"></div>
          </div>
          <div class="label">
            <svg viewBox="0 0 24 24"><circle class="d" cx="12" cy="7" r="1.5"/><circle class="d" cx="8.5" cy="10" r="1.5"/><circle class="d" cx="15.5" cy="10" r="1.5"/><circle class="d" cx="10" cy="14" r="1.5"/><circle class="d" cx="14" cy="14" r="1.5"/><circle class="d" cx="12" cy="17.5" r="1.5"/></svg>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom">
      <button class="pill cue" data-cue>CUE</button>
      <button class="pill play" data-play>▶</button>
      <button class="pill sync" data-sync>SYNC</button>
    </div>
    <input type="file" accept="audio/*,.mp3,.m4a,.aac,.wav,.aiff,.flac" data-file>
  </section>
</div>

<!-- EQ / VOL popup -->
<div class="eqpop" id="eqpop">
  <div class="eqcard">
    <h3 data-eqtitle>Ecualizador</h3>
    <div class="sliders">
      <div class="col"><input type="range" data-eqp="low"  min="0" max="100" value="50"><label>GRAVES</label></div>
      <div class="col"><input type="range" data-eqp="mid"  min="0" max="100" value="50"><label>MEDIOS</label></div>
      <div class="col"><input type="range" data-eqp="high" min="0" max="100" value="50"><label>AGUDOS</label></div>
      <div class="col"><input type="range" data-eqp="vol"  min="0" max="100" value="100"><label>VOL</label></div>
    </div>
    <button class="close" data-eqclose>Cerrar</button>
  </div>
</div>

<!-- Catálogo (buscador offline) -->
<div class="catpop" id="catpop">
  <div class="cathead">
    <input id="catsearch" placeholder="Buscar título o artista…" autocomplete="off" autocorrect="off" autocapitalize="off">
    <select id="catplaylist"><option value="">Todo</option></select>
    <button data-catclose aria-label="Cerrar">✕</button>
  </div>
  <div class="catstatus" id="catstatus"></div>
  <div class="catresults" id="catresults"></div>
</div>

<div id="splash">
  <img src="icons/icon-512.png" alt="">
  <h1>Vinyl DJ Mobile</h1>
  <p>Gira el iPhone en horizontal. Carga los temas con “+” desde Archivos / iCloud Drive.</p>
  <button id="startBtn">Empezar</button>
</div>

<script>
"use strict";
const AC = window.AudioContext || window.webkitAudioContext;
let ctx = null, master = null;

function xfGains(x){ return { a: x<=0 ? 1 : Math.max(0,1-x), b: x>=0 ? 1 : Math.max(0,1+x) }; }
function fmt(t){ t=Math.max(0,t||0); const m=Math.floor(t/60), s=Math.floor(t%60); return (m<10?'0':'')+m+':'+(s<10?'0':'')+s; }

class Deck {
  constructor(el, name){
    this.el=el; this.name=name;
    this.buffer=null; this.source=null; this.playing=false;
    this.offset=0; this.startTime=0; this.startOffset=0;
    this.rate=1; this.cuePoint=0; this.duration=0;
    this.rotation=0; this.dragging=false;
    this.$title=el.querySelector('[data-title]');
    this.$play=el.querySelector('[data-play]');
    this.$cue=el.querySelector('[data-cue]');
    this.$file=el.querySelector('[data-file]');
    this.$tempo=el.querySelector('[data-tempo]');
    this.$spin=el.querySelector('[data-spin]');
    this.$platter=el.querySelector('[data-platter]');
    this.eq={low:50,mid:50,high:50,vol:100};
  }
  build(){
    this.low=ctx.createBiquadFilter(); this.low.type='lowshelf'; this.low.frequency.value=120;
    this.mid=ctx.createBiquadFilter(); this.mid.type='peaking'; this.mid.frequency.value=1000; this.mid.Q.value=0.9;
    this.high=ctx.createBiquadFilter(); this.high.type='highshelf'; this.high.frequency.value=6000;
    this.channel=ctx.createGain(); this.xf=ctx.createGain();
    this.analyser=ctx.createAnalyser(); this.analyser.fftSize=256; this._an=new Uint8Array(this.analyser.frequencyBinCount);
    this.low.connect(this.mid); this.mid.connect(this.high); this.high.connect(this.channel);
    this.channel.connect(this.xf); this.xf.connect(this.analyser); this.analyser.connect(master);
    this.wire();
  }
  wire(){
    this.$play.addEventListener('click', ()=> this.toggle());
    this.$cue.addEventListener('click', ()=> this.cue());
    this.el.querySelector('[data-load]').addEventListener('click', ()=> this.$file.click());
    this.$file.addEventListener('change', e=> this.loadFile(e.target.files[0]));
    this.$tempo.addEventListener('input', ()=> this.setTempo(parseFloat(this.$tempo.value)));
    this.el.querySelector('[data-sync]').addEventListener('click', ()=> this.sync());
    this.el.querySelector('[data-eq-open]').addEventListener('click', ()=> openEq(this));
    // jog / scrub on the platter
    const p=this.$platter;
    const ang = ev=>{ const r=p.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2;
      const t=ev.touches?ev.touches[0]:ev; return Math.atan2(t.clientY-cy, t.clientX-cx); };
    const SEC_PER_REV=1.8;
    let last=0;
    const down=ev=>{ if(!this.buffer) return; this.dragging=true; this._wasPlaying=this.playing;
      if(this.playing) this.pause(); last=ang(ev); ev.preventDefault(); };
    const move=ev=>{ if(!this.dragging) return; const a=ang(ev); let d=a-last; if(d>Math.PI)d-=2*Math.PI; if(d<-Math.PI)d+=2*Math.PI;
      last=a; this.rotation+=d*180/Math.PI; this.offset=Math.min(this.duration,Math.max(0,this.offset+(d/(2*Math.PI))*SEC_PER_REV));
      this.applyRotation(); this.updateClock(); ev.preventDefault(); };
    const up=()=>{ if(!this.dragging) return; this.dragging=false; if(this._wasPlaying) this.play(); };
    p.addEventListener('touchstart',down,{passive:false}); p.addEventListener('touchmove',move,{passive:false}); p.addEventListener('touchend',up);
    p.addEventListener('mousedown',down); window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  }
  async loadFile(file){
    if(!file) return; this.$title.textContent='Cargando…';
    try{
      this.buffer=await ctx.decodeAudioData(await file.arrayBuffer());
      this.duration=this.buffer.duration; this.stopSource(); this.playing=false;
      this.offset=0; this.cuePoint=0; this.rotation=0; this.applyRotation();
      this.$play.classList.remove('on'); this.$play.textContent='▶';
      this.$title.style.color='var(--txt)';
      let disp=file.name.replace(/\.[^.]+$/,'');
      if(CAT && CAT.byfn){ const idx=CAT.byfn.get(file.name.toLowerCase());
        if(idx!=null){ const t=CAT.tracks[idx]; if(t[0]) disp=t[0]+(t[1]?' — '+t[1]:''); } }
      this.$title.textContent=disp; this._expectName=null; this.updateClock();
    }catch(err){ this.$title.textContent='No se pudo abrir'; console.error(err); }
  }
  position(){ return this.playing ? this.startOffset+(ctx.currentTime-this.startTime)*this.rate : this.offset; }
  stopSource(){ if(this.source){ try{this.source.onended=null; this.source.stop();}catch(e){} this.source=null; } }
  startAt(off){
    this.stopSource(); const s=ctx.createBufferSource(); s.buffer=this.buffer; s.playbackRate.value=this.rate;
    s.connect(this.low); s.start(0,Math.max(0,off));
    s.onended=()=>{ if(this.playing && this.position()>=this.duration-0.05){ this.playing=false; this.offset=this.duration; this.$play.classList.remove('on'); this.$play.textContent='▶'; } };
    this.source=s; this.startTime=ctx.currentTime; this.startOffset=off;
  }
  toggle(){ if(!this.buffer) return; this.playing?this.pause():this.play(); }
  play(){ if(!this.buffer) return; if(this.offset>=this.duration) this.offset=0; this.startAt(this.offset);
    this.playing=true; this.$play.classList.add('on'); this.$play.textContent='❚❚'; }
  pause(){ this.offset=this.position(); this.stopSource(); this.playing=false; this.$play.classList.remove('on'); this.$play.textContent='▶'; }
  cue(){ if(!this.buffer) return;
    if(this.playing){ this.pause(); this.seek(this.cuePoint); }
    else { this.cuePoint=this.offset; this.$cue.classList.add('armed'); this.seek(this.cuePoint); } }
  seek(t){ t=Math.min(this.duration,Math.max(0,t)); if(this.playing) this.startAt(t); else this.offset=t; this.updateClock(); }
  setTempo(pct){ this.rate=1+pct/100;
    if(this.playing){ this.startOffset=this.position(); this.startTime=ctx.currentTime; if(this.source) this.source.playbackRate.value=this.rate; } }
  sync(){ const other=this.name==='A'?window.deckB:window.deckA; if(!other) return;
    const pct=(other.rate-1)*100; this.$tempo.value=pct.toFixed(1); this.setTempo(pct); }
  setEqBand(b,v){ this.eq[b]=v;
    if(b==='vol'){ this.channel.gain.value=v/100; return; }
    const db=(v-50)/50*24; ({low:this.low,mid:this.mid,high:this.high})[b].gain.value=db; }
  applyRotation(){ this.$spin.style.transform='rotate('+(this.rotation%360)+'deg)'; }
  updateClock(){ this._clock=fmt(this.position())+' · '+fmt(this.duration); }
  meterLevel(){ if(!this.analyser) return 0; this.analyser.getByteTimeDomainData(this._an);
    let mx=0; for(let i=0;i<this._an.length;i++){ const v=Math.abs(this._an[i]-128); if(v>mx)mx=v; } return mx/128; }
}

// EQ popup wiring
let eqDeck=null;
function openEq(deck){ eqDeck=deck; const pop=document.getElementById('eqpop');
  pop.querySelector('[data-eqtitle]').textContent='Deck '+deck.name+' · Ecualizador';
  pop.querySelectorAll('[data-eqp]').forEach(s=> s.value=deck.eq[s.dataset.eqp]);
  pop.classList.add('show'); }
document.getElementById('eqpop').addEventListener('click', e=>{ if(e.target.id==='eqpop') e.currentTarget.classList.remove('show'); });
document.querySelector('[data-eqclose]').addEventListener('click', ()=> document.getElementById('eqpop').classList.remove('show'));
document.querySelectorAll('[data-eqp]').forEach(s=> s.addEventListener('input', ()=>{ if(eqDeck) eqDeck.setEqBand(s.dataset.eqp, parseFloat(s.value)); }));

let deckA, deckB;
function initAudio(){
  if(ctx) return;
  ctx=new AC(); master=ctx.createGain(); master.connect(ctx.destination);
  deckA=new Deck(document.getElementById('deckA'),'A'); deckA.build(); window.deckA=deckA;
  deckB=new Deck(document.getElementById('deckB'),'B'); deckB.build(); window.deckB=deckB;
  const xf=document.getElementById('xfader');
  const applyXf=()=>{ const g=xfGains(xf.value/100); deckA.xf.gain.value=g.a; deckB.xf.gain.value=g.b; };
  xf.addEventListener('input',applyXf); applyXf();
  let lastTap=0; xf.addEventListener('touchend',()=>{ const n=Date.now(); if(n-lastTap<300){ xf.value=0; applyXf(); } lastTap=n; });

  const mA=document.querySelector('[data-meter="a"]'), mB=document.querySelector('[data-meter="b"]');
  const clock=document.querySelector('[data-clock]');
  let prev=performance.now();
  function loop(now){
    const dt=(now-prev)/1000; prev=now;
    for(const d of [deckA,deckB]){
      if(d.playing && !d.dragging){ d.rotation+=dt*200*d.rate; d.applyRotation(); d.updateClock(); }
    }
    mA.style.width=Math.min(100,deckA.meterLevel()*130)+'%';
    mB.style.width=Math.min(100,deckB.meterLevel()*130)+'%';
    // show the clock of whichever deck is playing (A priority)
    const src = deckA.playing?deckA : (deckB.playing?deckB:deckA);
    clock.textContent = src._clock || '00:00 · 00:00';
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

// ---- Catálogo offline (buscador de tu biblioteca) ----
let CAT=null;
const catpop=document.getElementById('catpop'), catsearch=document.getElementById('catsearch'),
      catplaylist=document.getElementById('catplaylist'), catresults=document.getElementById('catresults'),
      catstatus=document.getElementById('catstatus');
const FMTNAME={d:'',v:'⬤ Vinilo',c:'📀 CD',k:'📼 Casete'};
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }
async function loadCatalog(){
  if(CAT) return CAT;
  catstatus.textContent='Cargando catálogo… (solo la primera vez)';
  try{
    const r=await fetch('catalog.json'); CAT=await r.json();
    CAT.hay=CAT.tracks.map(t=>(t[0]+' '+t[1]+' '+t[2]).toLowerCase());
    CAT.byfn=new Map(); CAT.tracks.forEach((t,i)=>{ if(t[3]) CAT.byfn.set(t[3].toLowerCase(),i); });
    catplaylist.innerHTML='<option value="">Todo el catálogo</option>'+
      CAT.playlists.map((p,i)=>`<option value="${i}">${escapeHtml(p.n)} (${p.t.length})</option>`).join('');
    catstatus.textContent=CAT.tracks.length.toLocaleString('es')+' temas · '+CAT.playlists.length+' listas';
  }catch(e){ catstatus.textContent='No se pudo cargar el catálogo.'; console.error(e); }
  return CAT;
}
function renderCat(){
  if(!CAT) return;
  const q=catsearch.value.trim().toLowerCase(), toks=q.split(/\s+/).filter(Boolean);
  const plIdx=catplaylist.value, pool = plIdx!=='' ? CAT.playlists[+plIdx].t : null;
  const LIM=200, res=[];
  const ok=i=> !toks.length || toks.every(k=>CAT.hay[i].includes(k));
  if(pool){ for(const i of pool){ if(ok(i)){ res.push(i); if(res.length>=LIM) break; } } }
  else { for(let i=0;i<CAT.tracks.length && res.length<LIM;i++){ if(ok(i)) res.push(i); } }
  catresults.innerHTML = res.map(i=>{ const t=CAT.tracks[i], fmt=FMTNAME[t[4]]||'';
    return `<div class="catrow"><div class="info"><b>${escapeHtml(t[0]||t[3])}</b>${fmt?`<span class="badge">${fmt}</span>`:''}`
      +`<div class="sub">${escapeHtml(t[1]||'—')}${t[2]?' · '+escapeHtml(t[2]):''} · ${escapeHtml(t[3])}</div></div>`
      +`<button class="toa" data-i="${i}" data-d="A">A</button><button class="tob" data-i="${i}" data-d="B">B</button></div>`;
  }).join('') || '<div class="catstatus">Sin resultados.</div>';
}
catsearch.addEventListener('input', debounce(renderCat,150));
catplaylist.addEventListener('change', renderCat);
catresults.addEventListener('click', e=>{
  const btn=e.target.closest('button[data-d]'); if(!btn) return;
  const deck = btn.dataset.d==='A' ? deckA : deckB;
  const t=CAT.tracks[+btn.dataset.i];
  deck._expectName=t[3];
  catpop.classList.remove('show');
  deck.$file.click();   // el usuario elige el archivo en Archivos/iCloud; al cargar se rellena el nombre del catálogo
});
document.querySelector('[data-catclose]').addEventListener('click', ()=> catpop.classList.remove('show'));
document.querySelector('[data-menu]').addEventListener('click', async ()=>{
  catpop.classList.add('show'); await loadCatalog(); renderCat(); catsearch.focus();
});

document.getElementById('startBtn').addEventListener('click', async ()=>{
  initAudio(); if(ctx.state!=='running'){ try{ await ctx.resume(); }catch(e){} }
  document.getElementById('splash').style.display='none';
});

if('serviceWorker' in navigator){ window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
